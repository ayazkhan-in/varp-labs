<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Varp Labs | Sophisticated Software</title>

    <!-- Google Fonts: preconnect for parallel DNS + TLS, then non-render-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Geist+Mono:wght@300;400;500;600&display=swap" />
    
    <!-- Canonical Link -->
    <link id="canonical-link" rel="canonical" href="https://varplabs.com/" />

    <!-- Open Graph / Meta Tags -->
    <meta name="description" content="Building sophisticated software solutions for the modern world. We transform complex requirements into elegant, high-performance digital products." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://varplabs.com/" />
    <meta property="og:title" content="Varp Labs | Sophisticated Software" />
    <meta property="og:description" content="Building sophisticated software solutions for the modern world. We transform complex requirements into elegant, high-performance digital products." />
    <meta property="og:image" content="/og.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://varplabs.com/" />
    <meta name="twitter:title" content="Varp Labs | Sophisticated Software" />
    <meta name="twitter:description" content="Building sophisticated software solutions for the modern world. We transform complex requirements into elegant, high-performance digital products." />
    <meta name="twitter:image" content="/og.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Varp Labs",
      "url": "https://varplabs.com",
      "logo": "https://varplabs.com/assets/logomark.svg",
      "sameAs": [
        "https://github.com/varp-labs",
        "https://www.linkedin.com/company/varplabs"
      ],
      "description": "Building sophisticated software solutions for the modern world. We transform complex requirements into elegant, high-performance digital products."
    }
    </script>
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "TeachBack",
        "operatingSystem": "All",
        "applicationCategory": "EducationalApplication",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD"
        },
        "description": "TeachBack is an AI-powered tutor designed around the Feynman Technique. Explain topics aloud, receive clarity feedback, and review with spaced repetition."
      },
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Sweep",
        "operatingSystem": "Android, iOS",
        "applicationCategory": "UtilitiesApplication",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD"
        },
        "description": "Sweep intelligently monitors device storage and automatically deletes screenshots based on age, size, and custom rules."
      },
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "QRLog",
        "operatingSystem": "Android",
        "applicationCategory": "UtilitiesApplication",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD"
        },
        "description": "QRLog is a minimal, privacy-focused Android scanner built for security. It archives every scan locally and blocks malicious redirect links."
      }
    ]
    </script>
    
    <!-- Default Favicon -->
    <link id="favicon" rel="icon" type="image/x-icon" href="/favicon-b/favicon.ico" />
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/favicon-b/favicon-32x32.png" />
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/favicon-b/favicon-16x16.png" />
    <link id="apple-touch" rel="apple-touch-icon" href="/favicon-b/apple-touch-icon.png" />
    
    <script>
      function updateFavicon() {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const mode = isDark ? 'favicon-w' : 'favicon-b';
        
        document.getElementById('favicon').href = `/${mode}/favicon.ico`;
        document.getElementById('favicon-32').href = `/${mode}/favicon-32x32.png`;
        document.getElementById('favicon-16').href = `/${mode}/favicon-16x16.png`;
        document.getElementById('apple-touch').href = `/${mode}/apple-touch-icon.png`;
      }
      
      // Update on page load
      updateFavicon();
      
      // Listen for theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
